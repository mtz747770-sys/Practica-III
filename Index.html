<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Gastos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>Control de Gastos</h1>

    <form id="expense-form">
      <input type="text" id="expense-desc" placeholder="Descripción del gasto" required>
      <input type="number" id="expense-amount" placeholder="Monto" required>
      <button type="submit">Agregar</button>
    </form>

    <ul id="expense-list"></ul>
  </div>

  <div class="campo">
    <label for="categoria">Categoría</label>

    <select id="categoria" required>
        <option value="">Selecciona una categoría</option>
        <option value="Alimentación">Alimentación</option>
        <option value="Transporte">Transporte</option>
        <option value="Entretenimiento">Entretenimiento</option>
        <option value="Servicios">Servicios</option>
        <option value="Educación">Educación</option>
        <option value="Salud">Salud</option>
        <option value="Otros">Otros</option>
    </select>
  </div>

  <div class="campo">
    <label for="fecha">Fecha del gasto</label>
    <input type="date" id="fecha" required>
  </div>

    <div class="resumen">
        <h2>Resumen de gastos por categoría</h2>
        <canvas id="expense-chart" width="400" height="250"></canvas>
    </div>

  <script src="script.js"></script>
</body>
</html>
