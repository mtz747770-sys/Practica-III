<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Gastos | Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-container">
    
    <!-- Columna Izquierda: Formularios y Límites -->
    <aside class="panel-izquierdo">
      <header class="app-header">
        <h1>Control de Gastos</h1>
        <p>Administra tu presupuesto</p>
      </header>

      <!-- Tarjeta de Límites -->
      <section class="card limite-gastos">
        <h2>Presupuesto</h2>
        <div class="limite-grid">
          <div class="campo">
            <input type="number" id="limiteGasto" placeholder="Establecer límite..." min="1" step="0.01">
          </div>
          <button type="button" id="guardarLimite" class="btn-secundario">Fijar Límite</button>
        </div>
        
        <div class="stats-limite">
          <div class="stat-box">
            <span class="stat-label">Límite</span>
            <span id="informacionLimite" class="stat-value">$0.00</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Gastado</span>
            <span id="gastoAcumulado" class="stat-value">$0.00</span>
          </div>
          <div class="stat-box highlight">
            <span class="stat-label">Disponible</span>
            <span id="gastoDisponible" class="stat-value">$0.00</span>
          </div>
        </div>
        <p id="mensajeLimite" class="alerta-mensaje"></p>
      </section>

      <!-- Tarjeta de Registro de Gasto -->
      <section class="card form-gasto">
        <h2>Registrar Nuevo Gasto</h2>
        <form id="expense-form">
          <div class="campo">
            <label for="expense-desc">Descripción</label>
            <input type="text" id="expense-desc" placeholder="Ej. Cena en restaurante" required>
          </div>
          
          <div class="form-fila">
            <div class="campo">
              <label for="expense-amount">Monto</label>
              <input type="number" id="expense-amount" placeholder="0.00" required>
            </div>
            <div class="campo">
              <label for="fecha">Fecha</label>
              <input type="date" id="fecha" required>
            </div>
          </div>

          <div class="campo">
            <label for="categoria">Categoría</label>
            <select id="categoria" required>
              <option value="">Selecciona una categoría</option>
              <option value="Alimentación">Alimentación</option>
              <option value="Transporte">Transporte</option>
              <option value="Entretenimiento">Entretenimiento</option>
              <option value="Servicios">Servicios</option>
              <option value="Educación">Educación</option>
              <option value="Salud">Salud</option>
              <option value="Otros">Otros</option>
            </select>
          </div>

          <button type="submit" class="btn-primario">Agregar Gasto</button>
        </form>
      </section>
    </aside>

    <!-- Columna Derecha: Gráficas y Listas -->
    <main class="panel-derecho">
      
      <!-- Tarjeta de Gráfica -->
      <section class="card resumen-card">
        <h2>Resumen por Categoría</h2>
        <div class="canvas-container">
          <canvas id="expense-chart" width="400" height="220"></canvas>
        </div>
      </section>

      <!-- Tarjeta de Historial -->
      <section class="card historial-card">
        <div class="historial-header">
          <h2>Historial</h2>
          <div class="filtro-container">
            <label for="filtro-fecha">Filtro:</label>
            <select id="filtro-fecha" class="select-pequeno">
              <option value="todos">Todos</option>
              <option value="hoy">Hoy</option>
              <option value="semana">Esta semana</option>
              <option value="mes">Este mes</option>
            </select>
          </div>
        </div>
        
        <ul id="expense-list" class="lista-moderna"></ul>
      </section>
      
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
